<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMINA — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Archivo:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0c0b;
      --surface: #141413;
      --border: #2a2a27;
      --accent: #d63384;
      --green: #1a7f3c;
      --text: #f0ede6;
      --muted: #7a7770;
      --white: #ffffff;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Archivo', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    button { cursor: pointer; border: none; background: none; font-family: var(--font-body); }

    /* ── HEADER ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(12,12,11,0.88);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1400px; margin: 0 auto; padding: 0 32px;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: var(--font-display); font-size: 22px; font-weight: 300; letter-spacing: 0.3em; color: var(--accent); }
    .nav-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

    /*
       HOME PAGE — 3 CATEGORY BOXES
   */
    #home-page { display: block; }
    #gallery-page { display: none; }

    .home-hero {
      padding: 120px 32px 48px;
      max-width: 1400px; margin: 0 auto; text-align: center;
    }
    .home-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 7vw, 90px);
      font-weight: 300; line-height: 1; letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .home-hero h1 em { font-style: italic; color: var(--accent); }
    .home-hero p { font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }

    /* 3 BIG BOXES */
    .category-grid {
      max-width: 1400px; margin: 0 auto;
      padding: 48px 32px 80px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .cat-box {
      position: relative;
      height: 480px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.4s ease;
    }
    .cat-box:hover { transform: translateY(-8px); box-shadow: 0 24px 48px rgba(0,0,0,0.5); }

    .cat-box img {
      transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease;
      filter: brightness(0.7) saturate(0.85);
    }
    .cat-box:hover img { transform: scale(1.07); filter: brightness(0.85) saturate(1.1); }

    .cat-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 60%, transparent 100%);
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: center;
      padding: 32px 24px; text-align: center;
      transition: background 0.4s ease;
    }
    .cat-box:hover .cat-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.25) 60%, transparent 100%);
    }

    .cat-icon {
      font-size: 36px; margin-bottom: 12px;
      transform: translateY(6px); opacity: 0.9;
      transition: transform 0.4s ease;
    }
    .cat-box:hover .cat-icon { transform: translateY(0); }

    .cat-name {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 300;
      color: var(--white); line-height: 1;
      margin-bottom: 10px;
      transform: translateY(4px);
      transition: transform 0.4s ease;
    }
    .cat-box:hover .cat-name { transform: translateY(0); }

    .cat-count {
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.55);
      margin-bottom: 18px;
      transform: translateY(4px);
      transition: transform 0.4s ease 0.05s;
    }
    .cat-box:hover .cat-count { transform: translateY(0); }

    .cat-btn {
      padding: 10px 28px;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      border-radius: 2px; color: var(--bg);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
    }
    .cat-box:hover .cat-btn { opacity: 1; transform: translateY(0); }

    .cat-box:nth-child(1) .cat-btn { background: var(--green); }
    .cat-box:nth-child(2) .cat-btn { background: var(--accent); }
    .cat-box:nth-child(3) .cat-btn { background: #c9a84c; }

    /* accent border top on hover */
    .cat-box::after {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
    }
    .cat-box:nth-child(1)::after { background: var(--green); }
    .cat-box:nth-child(2)::after { background: var(--accent); }
    .cat-box:nth-child(3)::after { background: #c9a84c; }
    .cat-box:hover::after { transform: scaleX(1); }

    /* ══════════════════════════════
       GALLERY PAGE
    ══════════════════════════════ */
    .gallery-header {
      padding: 90px 32px 28px;
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; gap: 20px;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); padding: 8px 16px;
      border: 1px solid var(--border); border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--text); }
    .back-btn span { font-size: 16px; }

    .gallery-title-area { flex: 1; }
    .gallery-cat-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 60px);
      font-weight: 300; line-height: 1;
    }
    .gallery-cat-title em { font-style: italic; }
    .gallery-cat-sub {
      font-size: 11px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted); margin-top: 6px;
    }

    .gallery-grid {
      max-width: 1400px; margin: 0 auto;
      padding: 32px 32px 80px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 260px;
      gap: 12px;
    }

    .gallery-item { position: relative; overflow: hidden; border-radius: 4px; background: var(--surface); cursor: pointer; }
    .gallery-item.wide { grid-column: span 2; }
    .gallery-item.tall { grid-row: span 2; }

    .gallery-item { opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s forwards; }
    .gallery-item:nth-child(1){animation-delay:0.05s}
    .gallery-item:nth-child(2){animation-delay:0.10s}
    .gallery-item:nth-child(3){animation-delay:0.15s}
    .gallery-item:nth-child(4){animation-delay:0.20s}
    .gallery-item:nth-child(5){animation-delay:0.25s}
    .gallery-item:nth-child(6){animation-delay:0.30s}
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    .item-inner { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .item-inner img { transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease; filter: brightness(0.9) saturate(0.9); }
    .gallery-item:hover .item-inner img { transform: scale(1.06); filter: brightness(1) saturate(1.1); }

    .item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(12,12,11,0.88) 0%, rgba(12,12,11,0.3) 50%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
      opacity: 0; transition: opacity 0.4s ease;
    }
    .gallery-item:hover .item-overlay { opacity: 1; }

    .item-title {
      font-family: var(--font-display); font-size: 20px; font-weight: 300;
      color: var(--white); line-height: 1.2;
      transform: translateY(8px); transition: transform 0.4s ease;
    }
    .item-cat {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-top: 4px;
      transform: translateY(8px); transition: transform 0.4s ease 0.05s;
    }
    .gallery-item:hover .item-title,
    .gallery-item:hover .item-cat { transform: translateY(0); }

    .zoom-btn {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: var(--white); font-size: 14px;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
      opacity: 0; transform: scale(0.8);
      transition: opacity 0.2s, transform 0.2s, background 0.2s;
    }
    .gallery-item:hover .zoom-btn { opacity: 1; transform: scale(1); }
    .zoom-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; transition: opacity 0.35s ease;
    }
    .lightbox.open { pointer-events: all; opacity: 1; }
    .lb-backdrop { position: absolute; inset: 0; background: rgba(8,8,7,0.95); backdrop-filter: blur(8px); }
    .lb-container {
      position: relative; z-index: 2;
      width: min(90vw, 1100px); max-height: 92vh;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      transform: scale(0.95); transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .lightbox.open .lb-container { transform: scale(1); }
    .lb-image-wrap {
      position: relative; width: 100%; max-height: 70vh;
      border-radius: 4px; overflow: hidden;
      background: var(--surface); border: 1px solid var(--border);
    }
    .lb-img { width: 100%; max-height: 70vh; object-fit: contain; display: block; transition: opacity 0.3s ease, filter 0.4s ease; }
    .lb-img.loading { opacity: 0; }
    .lb-loader {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 32px; height: 32px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
    }
    .lb-loader.active { display: block; }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border: 1px solid var(--border);
      border-radius: 50%; color: var(--text); font-size: 20px;
      background: rgba(20,20,19,0.8); backdrop-filter: blur(4px);
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
      z-index: 3; display: flex; align-items: center; justify-content: center;
    }
    .lb-prev { left: -64px; }
    .lb-next { right: -64px; }
    .lb-nav:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); transform: translateY(-50%) scale(1.1); }
    .lb-close {
      position: absolute; top: -52px; right: 0;
      width: 40px; height: 40px; border: 1px solid var(--border);
      border-radius: 50%; color: var(--muted); font-size: 16px;
      background: var(--surface); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-close:hover { color: var(--text); border-color: var(--text); transform: rotate(90deg); }
    .lb-info { display: flex; align-items: baseline; gap: 16px; width: 100%; }
    .lb-title { font-family: var(--font-display); font-size: 22px; font-weight: 300; color: var(--text); }
    .lb-cat { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
    .lb-counter { margin-left: auto; font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }
    .lb-filters { display: flex; gap: 8px; flex-wrap: wrap; width: 100%; }
    .filter-pill {
      padding: 5px 14px; border: 1px solid var(--border);
      border-radius: 20px; color: var(--muted);
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: all 0.2s; background: transparent;
    }
    .filter-pill:hover { border-color: var(--accent); color: var(--accent); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 700; }

    .site-footer { text-align: center; padding: 32px; border-top: 1px solid var(--border); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .category-grid { grid-template-columns: 1fr; gap: 16px; padding: 32px 20px 60px; }
      .cat-box { height: 300px; }
      .cat-btn { opacity: 1; transform: translateY(0); }
      .gallery-grid { grid-template-columns: repeat(2,1fr); grid-auto-rows: 200px; padding: 20px 16px 60px; }
      .lb-prev { left: 0; } .lb-next { right: 0; }
    }
    @media (max-width: 600px) {
      .gallery-grid { grid-template-columns: 1fr; }
      .gallery-item.wide, .gallery-item.tall { grid-column: span 1; grid-row: span 1; }
      .header-inner { padding: 0 16px; }
      .home-hero { padding: 90px 16px 32px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">Picture Point</div>
      <nav class="site-nav"><span class="nav-label">Collection 2026</span></nav>
    </div>
  </header>

  <!-- ══ HOME PAGE ══ -->
  <div id="home-page">
    <section class="home-hero">
      <h1><em>Choose</em> Your World</h1>
      <p>Select a category below to explore the collection</p>
    </section>

    <div class="category-grid">

      <!-- BOX 1 — FARMING -->
      <div class="cat-box" onclick="openCategory('farming')">
        <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=900&q=80" alt="Farming" />
        <div class="cat-overlay">
          <div class="cat-icon">🌾</div>
          <div class="cat-name">Farming</div>
          <div class="cat-count">4 photos</div>
          <button class="cat-btn">Explore →</button>
        </div>
      </div>

      <!-- BOX 2 — FAMILY -->
      <div class="cat-box" onclick="openCategory('family')">
        <img src="https://images.unsplash.com/photo-1609220136736-443140cffec6?w=900&q=80" alt="Family Photos" />
        <div class="cat-overlay">
          <div class="cat-icon">👨‍👩‍👧‍👦</div>
          <div class="cat-name">Family</div>
          <div class="cat-count">4 photos</div>
          <button class="cat-btn">Explore →</button>
        </div>
      </div>

      <!-- BOX 3 — NATURE -->
      <div class="cat-box" onclick="openCategory('nature')">
        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&q=80" alt="Nature" />
        <div class="cat-overlay">
          <div class="cat-icon">🌿</div>
          <div class="cat-name">Nature</div>
          <div class="cat-count">4 photos</div>
          <button class="cat-btn">Explore →</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══ GALLERY PAGE ══ -->
  <div id="gallery-page">
    <div class="gallery-header">
      <button class="back-btn" onclick="goHome()"><span>←</span> Back</button>
      <div class="gallery-title-area">
        <h2 class="gallery-cat-title" id="gallery-cat-title"><em>Farming</em></h2>
        <p class="gallery-cat-sub" id="gallery-cat-sub">4 photos in this collection</p>
      </div>
    </div>

    <main class="gallery-grid" id="gallery-grid"></main>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-backdrop" id="lb-backdrop"></div>
    <div class="lb-container">
      <button class="lb-close" id="lb-close">&#x2715;</button>
      <button class="lb-nav lb-prev" id="lb-prev">&#x2190;</button>
      <div class="lb-image-wrap">
        <img src="" alt="" id="lb-img" class="lb-img" />
        <div class="lb-loader" id="lb-loader"></div>
      </div>
      <button class="lb-nav lb-next" id="lb-next">&#x2192;</button>
      <div class="lb-info">
        <span class="lb-title" id="lb-title"></span>
        <span class="lb-cat" id="lb-cat"></span>
        <span class="lb-counter" id="lb-counter"></span>
      </div>
      <div class="lb-filters">
        <button class="filter-pill active" data-css-filter="none">Original</button>
        <button class="filter-pill" data-css-filter="grayscale(100%)">B&amp;W</button>
        <button class="filter-pill" data-css-filter="sepia(80%)">Sepia</button>
        <button class="filter-pill" data-css-filter="contrast(140%) saturate(140%)">Vivid</button>
        <button class="filter-pill" data-css-filter="brightness(1.2) contrast(0.9)">Matte</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Picture Point &copy; 2026 — capturing Moments,Creating Memories 🤩</p>
  </footer>

  <script>
    // ── PHOTO DATA ──
    const data = {
      farming: [
        { src: 'https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=1200&q=80', title: 'Golden Wheat Field', wide: true },
        { src: 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=800&q=80',  title: 'Farm Tractor', tall: true },
        { src: 'https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=800&q=80',  title: 'Fresh Harvest' },
        { src: 'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=800&q=80',  title: 'Rural Farmland' },
      ],
      family: [
        { src: 'https://images.unsplash.com/photo-1609220136736-443140cffec6?w=1200&q=80', title: 'Family Moments', wide: true },
        { src: 'https://images.unsplash.com/photo-1511895426328-dc8714191011?w=800&q=80',  title: 'Happy Together', tall: true },
        { src: 'https://images.unsplash.com/photo-1484665754804-74b091211472?w=800&q=80',  title: 'Childhood Joy' },
        { src: 'https://images.unsplash.com/photo-1530023367847-a683933f4172?w=800&q=80',  title: 'Family Bonds' },
      ],
      nature: [
        { src: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80', title: 'Mountain Vista', wide: true },
        { src: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80',  title: 'Forest Path', tall: true },
        { src: 'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=800&q=80',  title: 'Ocean Waves' },
        { src: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',  title: 'Golden Sunset' },
      ]
    };

    const labels = { farming: 'Farming 🌾', family: 'Family 👨‍👩‍👧‍👦', nature: 'Nature 🌿' };

    let currentCat = '';
    let currentIndex = 0;
    let currentFilter = 'none';

    // ── OPEN CATEGORY ──
    function openCategory(cat) {
      currentCat = cat;
      document.getElementById('home-page').style.display = 'none';
      document.getElementById('gallery-page').style.display = 'block';
      document.getElementById('gallery-cat-title').innerHTML = '<em>' + labels[cat] + '</em>';
      document.getElementById('gallery-cat-sub').textContent = data[cat].length + ' photos in this collection';
      buildGrid(cat);
      window.scrollTo(0, 0);
    }

    // ── GO HOME ──
    function goHome() {
      document.getElementById('gallery-page').style.display = 'none';
      document.getElementById('home-page').style.display = 'block';
      window.scrollTo(0, 0);
    }

    // ── BUILD GRID ──
    function buildGrid(cat) {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = '';
      data[cat].forEach(function(photo, i) {
        var cls = 'gallery-item' + (photo.wide ? ' wide' : '') + (photo.tall ? ' tall' : '');
        var div = document.createElement('div');
        div.className = cls;
        div.innerHTML =
          '<div class="item-inner">' +
            '<img src="' + photo.src + '" alt="' + photo.title + '" loading="lazy" />' +
            '<div class="item-overlay">' +
              '<span class="item-title">' + photo.title + '</span>' +
              '<span class="item-cat">' + labels[cat] + '</span>' +
              '<button class="zoom-btn" aria-label="Open">&#x26F6;</button>' +
            '</div>' +
          '</div>';
        div.addEventListener('click', function() { openLightbox(i); });
        div.querySelector('.zoom-btn').addEventListener('click', function(e) { e.stopPropagation(); openLightbox(i); });
        grid.appendChild(div);
      });
    }

    // ── LIGHTBOX ──
    function openLightbox(index) {
      currentIndex = index;
      renderLB();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function renderLB() {
      var photos = data[currentCat];
      var photo = photos[currentIndex];
      var loader = document.getElementById('lb-loader');
      var img = document.getElementById('lb-img');
      loader.classList.add('active');
      img.classList.add('loading');
      var tmp = new Image();
      tmp.onload = function() {
        img.src = photo.src;
        img.alt = photo.title;
        img.style.filter = currentFilter === 'none' ? '' : currentFilter;
        img.classList.remove('loading');
        loader.classList.remove('active');
      };
      tmp.onerror = function() { img.src = photo.src; img.classList.remove('loading'); loader.classList.remove('active'); };
      tmp.src = photo.src;
      document.getElementById('lb-title').textContent = photo.title;
      document.getElementById('lb-cat').textContent = labels[currentCat];
      document.getElementById('lb-counter').textContent = (currentIndex + 1) + ' / ' + photos.length;
    }

    function closeLB() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      document.querySelectorAll('.filter-pill').forEach(function(p,i){ p.classList.toggle('active', i===0); });
      currentFilter = 'none';
      document.getElementById('lb-img').style.filter = '';
    }

    document.getElementById('lb-close').addEventListener('click', closeLB);
    document.getElementById('lb-backdrop').addEventListener('click', closeLB);
    document.getElementById('lb-prev').addEventListener('click', function(e) {
      e.stopPropagation();
      currentIndex = (currentIndex - 1 + data[currentCat].length) % data[currentCat].length;
      renderLB();
    });
    document.getElementById('lb-next').addEventListener('click', function(e) {
      e.stopPropagation();
      currentIndex = (currentIndex + 1) % data[currentCat].length;
      renderLB();
    });

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex+1) % data[currentCat].length; renderLB(); }
      if (e.key === 'ArrowLeft')  { currentIndex = (currentIndex-1+data[currentCat].length) % data[currentCat].length; renderLB(); }
      if (e.key === 'Escape') closeLB();
    });

    // touch swipe
    var tx = 0;
    document.getElementById('lightbox').addEventListener('touchstart', function(e){ tx = e.changedTouches[0].clientX; }, {passive:true});
    document.getElementById('lightbox').addEventListener('touchend', function(e){
      var diff = tx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) { currentIndex = diff > 0 ? (currentIndex+1)%data[currentCat].length : (currentIndex-1+data[currentCat].length)%data[currentCat].length; renderLB(); }
    }, {passive:true});

    // image filters
    document.querySelectorAll('.filter-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.filter-pill').forEach(function(p){ p.classList.remove('active'); });
        pill.classList.add('active');
        currentFilter = pill.dataset.cssFilter;
        document.getElementById('lb-img').style.filter = currentFilter === 'none' ? '' : currentFilter;
      });
    });
  </script>

</body>
</html>
